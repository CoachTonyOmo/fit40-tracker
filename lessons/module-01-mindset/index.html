.tag.neon{background:rgba(0,242,97,0.1);border:1px solid rgba(0,242,97,0.35);color:var(--accent);}

/* ── Card grid ── */
.card-grid{display:grid;gap:16px;margin:24px 0;}
.card-grid.cols-2{grid-template-columns:1fr 1fr;}
.card-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.card{background:var(--graphite);border-top:2px solid var(--accent);padding:28px 24px;transition:transform 0.15s,box-shadow 0.15s;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.card.volt{border-top-color:var(--volt);}
.card.red{border-top-color:var(--red);}
.card h4{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);margin-bottom:10px;}
.card.volt h4{color:var(--volt);}
.card.red h4{color:var(--red);}
.card p{font-size:15px;line-height:1.7;color:rgba(255,255,255,0.6);margin:0;}

/* ── Reframe table ── */
.reframe-table{width:100%;border-collapse:collapse;margin:24px 0;}
.reframe-table thead th{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;padding:10px 16px;text-align:left;background:var(--graphite);}
.reframe-table thead th:first-child{color:var(--red);}
.reframe-table thead th:last-child{color:var(--accent);}
.reframe-table thead th.ac{width:40px;text-align:center;}
.reframe-table tbody tr{border-bottom:1px solid var(--border);}
.reframe-table tbody tr:hover td{background:rgba(255,255,255,0.02);}
.reframe-table tbody td{padding:14px 16px;font-size:15px;line-height:1.6;vertical-align:middle;}
.reframe-table tbody td:first-child{color:rgba(255,100,100,0.85);}
.reframe-table tbody td:last-child{color:rgba(0,242,97,0.85);}
.reframe-table tbody td.ac{text-align:center;color:var(--text-dim);font-size:16px;}

/* ── Sequence list ── */
.seq-list{display:flex;flex-direction:column;gap:0;margin:24px 0;border:1px solid var(--border);}
.seq-item{display:flex;align-items:flex-start;border-bottom:1px solid var(--border);transition:background 0.15s;}
.seq-item:last-child{border-bottom:none;}
.seq-item:hover{background:rgba(255,255,255,0.02);}
.seq-num{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;color:rgba(0,242,97,0.2);line-height:1;padding:20px 20px 20px 24px;min-width:80px;flex-shrink:0;border-right:1px solid var(--border);}
.seq-content{padding:20px 24px;flex:1;}
.seq-content h4{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--white);margin-bottom:6px;}
.seq-content p{font-size:15px;line-height:1.65;color:rgba(255,255,255,0.6);margin:0;}

/* ── Round won ── */
.round-won-list{display:flex;flex-direction:column;gap:12px;margin:24px 0;}
.rw-card{background:var(--graphite);border:1px solid rgba(0,242,97,0.15);border-left:3px solid var(--accent);padding:18px 20px;transition:background 0.15s;}
.rw-card:hover{background:var(--surface);}
.rw-card p{font-size:16px;line-height:1.6;color:rgba(255,255,255,0.85);margin-bottom:8px;}
.rw-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);}

/* ── Accordion ── */
.accordion{border:1px solid var(--border);margin:20px 0;}
.accordion-item{border-bottom:1px solid var(--border);}
.accordion-item:last-child{border-bottom:none;}
.accordion-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:transparent;border:none;color:var(--white);font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;text-align:left;transition:background 0.15s;}
.accordion-trigger:hover{background:rgba(255,255,255,0.03);}
.accordion-trigger.open{color:var(--accent);}
.accordion-icon{width:20px;height:20px;border:1px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform 0.25s,border-color 0.15s;}
.accordion-trigger.open .accordion-icon{transform:rotate(45deg);border-color:var(--accent);color:var(--accent);}
.accordion-body{overflow:hidden;max-height:0;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);}
.accordion-body.open{max-height:2000px;}
.accordion-inner{padding:4px 24px 24px;font-size:16px;line-height:1.75;color:var(--text);border-top:1px solid var(--border);}
.accordion-inner p{margin-bottom:12px;}
.accordion-inner p:last-child{margin-bottom:0;}

/* ── Quad diagram ── */
.quad-diagram{position:relative;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;background:var(--border);margin:28px 0;border:1px solid var(--border);min-height:400px;}
.quad-cell{background:var(--graphite);display:flex;flex-direction:column;gap:8px;}
.quad-cell:nth-child(1){padding:28px 90px 90px 28px;justify-content:flex-start;}
.quad-cell:nth-child(2){padding:28px 28px 90px 90px;justify-content:flex-start;}
.quad-cell:nth-child(3){padding:90px 90px 28px 28px;justify-content:flex-end;}
.quad-cell:nth-child(4){padding:90px 28px 28px 90px;justify-content:flex-end;}
.quad-cell h4{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--white);}
.quad-cell p{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.55);margin:0;}
.quad-center-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:152px;height:152px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;text-align:center;z-index:5;box-shadow:0 0 40px rgba(0,242,97,0.6),0 0 80px rgba(0,242,97,0.25);animation:qglow 2.5s ease-in-out infinite;pointer-events:none;}
.quad-center-badge p{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;color:#000;line-height:1.25;padding:0 12px;margin:0;}
@keyframes qglow{0%,100%{box-shadow:0 0 30px rgba(0,242,97,0.55),0 0 60px rgba(0,242,97,0.2);}50%{box-shadow:0 0 50px rgba(0,242,97,0.8),0 0 100px rgba(0,242,97,0.35);}}

/* ── Skool prompt ── */
.skool-prompt{background:var(--graphite);border:1px solid rgba(0,242,97,0.2);border-left:3px solid var(--accent);padding:24px 28px;margin:32px 0 0;}
.skool-prompt-label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.skool-prompt-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;animation:ppulse 2s ease-in-out infinite;}
@keyframes ppulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.skool-prompt p{font-size:17px;line-height:1.65;color:rgba(255,255,255,0.8);margin:0;font-style:italic;}

/* ── Homework ── */
.homework-block{background:var(--graphite);border:1px solid var(--border);padding:32px 28px;margin:40px 0 0;}
.homework-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.homework-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent);margin-bottom:6px;display:block;}
.homework-title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--white);}
.homework-progress{text-align:right;flex-shrink:0;}
.hw-progress-label{font-family:'Sora',sans-serif;font-size:11px;color:var(--text-dim);letter-spacing:0.06em;margin-bottom:6px;display:block;}
.hw-progress-bar{width:120px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.hw-progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.4s ease;box-shadow:0 0 8px var(--accent);}
.hw-progress-count{font-family:'Sora',sans-serif;font-size:11px;color:var(--accent);margin-top:4px;display:block;text-align:right;}
.checklist{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);}
.checklist-item{display:flex;align-items:center;gap:16px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;user-select:none;}
.checklist-item:last-child{border-bottom:none;}
.checklist-item:hover{background:rgba(255,255,255,0.03);}
.checklist-item.checked{opacity:0.6;}
.check-box{width:20px;height:20px;border:1.5px solid rgba(255,255,255,0.25);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.checklist-item.checked .check-box{background:var(--accent);border-color:var(--accent);}
.check-mark{color:#000;font-size:13px;opacity:0;transition:opacity 0.15s;}
.checklist-item.checked .check-mark{opacity:1;}
.checklist-item.checked .check-label{text-decoration:line-through;}
.check-label{font-size:16px;color:rgba(255,255,255,0.8);flex:1;}

/* ── Intro hero ── */
.intro-hero{background:linear-gradient(160deg,#000 0%,#061a0c 45%,#000 100%);border-bottom:1px solid var(--border);padding:80px 0 64px;text-align:center;position:relative;overflow:hidden;}
.intro-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,242,97,0.08) 0%,transparent 70%),repeating-linear-gradient(to bottom,transparent 0px,transparent 72px,rgba(255,255,255,0.015) 72px,rgba(255,255,255,0.015) 73px),repeating-linear-gradient(to right,transparent 0px,transparent 72px,rgba(255,255,255,0.015) 72px,rgba(255,255,255,0.015) 73px);pointer-events:none;}
.intro-hero-inner{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 32px;}
.intro-exclusive{display:inline-flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:28px;}
.intro-exclusive::before,.intro-exclusive::after{content:'';height:1px;width:32px;background:var(--border);}
.intro-hero h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(40px,6vw,72px);text-transform:uppercase;letter-spacing:0.01em;line-height:0.95;color:var(--white);margin-bottom:10px;}
.intro-hero h1 em{display:block;font-style:normal;color:var(--accent);text-shadow:0 0 40px rgba(0,242,97,0.4);font-size:0.85em;letter-spacing:0.03em;}
.intro-hero-sub{font-size:17px;line-height:1.7;color:var(--text);max-width:540px;margin:16px auto 0;}
.intro-stat-row{display:flex;align-items:stretch;justify-content:center;margin:40px auto 0;border:1px solid var(--border);background:rgba(0,0,0,0.4);max-width:540px;}
.intro-stat{flex:1;padding:20px 16px;text-align:center;border-right:1px solid var(--border);}
.intro-stat:last-child{border-right:none;}
.intro-stat-num{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:5px;display:block;}
.intro-stat-label{font-family:'Sora',sans-serif;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;line-height:1.4;display:block;}

/* ── How it works ── */
.intro-how{background:var(--charcoal);border-bottom:1px solid var(--border);}
.intro-how-inner{max-width:var(--content-w);margin:0 auto;padding:40px 32px;}
.intro-how-header{display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;}
.intro-how-title{font-family:'Oswald',sans-serif;font-size:clamp(20px,2.5vw,26px);font-weight:700;text-transform:uppercase;letter-spacing:0.03em;color:var(--white);}
.intro-how-title em{color:var(--accent);font-style:normal;}
.intro-toggle-btn{font-family:'Sora',sans-serif;font-size:11px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:2px;padding:6px 14px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.intro-toggle-btn:hover{border-color:var(--accent);color:var(--accent);}
.intro-how-body{overflow:hidden;max-height:0;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);}
.intro-how-body.open{max-height:800px;}
.intro-how-content{padding-top:24px;font-size:16px;line-height:1.75;color:var(--text);}
.intro-how-content p{margin-bottom:14px;}
.intro-how-content p:last-child{margin-bottom:0;}
.intro-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;}
.intro-step{background:var(--graphite);border-top:2px solid var(--accent);padding:20px 18px;display:flex;align-items:flex-start;gap:14px;}
.intro-step-num{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:rgba(0,242,97,0.25);line-height:1;flex-shrink:0;}
.intro-step-body h4{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:4px;}
.intro-step-body p{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.55);margin:0;}

/* ── Roadmap ── */
.intro-roadmap{background:var(--black);border-bottom:1px solid var(--border);padding:48px 0;}
.intro-roadmap-inner{max-width:var(--content-w);margin:0 auto;padding:0 32px;}
.roadmap-eyebrow{font-family:'Sora',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:28px;display:block;}
.track-wrap{position:relative;margin-bottom:36px;}
.track-nodes{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;}
.track-node{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex:1;}
.track-node-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--charcoal);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;color:var(--text-dim);transition:all 0.2s;position:relative;z-index:2;}
.track-node:hover .track-node-dot,.track-node.is-active .track-node-dot{border-color:var(--accent);background:var(--accent);color:#000;box-shadow:0 0 14px rgba(0,242,97,0.5);}
.track-node-label{font-family:'Sora',sans-serif;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-dim);text-align:center;max-width:64px;line-height:1.3;}
.track-node:hover .track-node-label,.track-node.is-active .track-node-label{color:var(--accent);}
.track-line-row{display:flex;align-items:center;margin:4px 0;}
.track-start-label,.track-end-label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);flex-shrink:0;padding:0 8px;}
.track-end-label{color:var(--volt);}
.track-line{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden;}
.track-line-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--accent),rgba(0,242,97,0.3));animation:tfill 1.8s ease-out forwards;box-shadow:0 0 8px var(--accent);}
@keyframes tfill{from{width:0%}to{width:40%}}
.lesson-overview{border:1px solid var(--border);}
.lesson-overview-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--graphite);border-bottom:1px solid var(--border);}
.lesson-overview-header h3{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--white);}
.lesson-overview-sub{font-family:'Sora',sans-serif;font-size:11px;color:var(--text-dim);letter-spacing:0.06em;}
.overview-row{display:flex;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;text-decoration:none;}
.overview-row:last-child{border-bottom:none;}
.overview-row:hover{background:rgba(255,255,255,0.03);}
.overview-day{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);background:rgba(0,242,97,0.07);border-right:1px solid var(--border);padding:18px 16px;min-width:88px;text-align:center;line-height:1.3;flex-shrink:0;}
.overview-day span{display:block;font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;}
.overview-content{padding:14px 20px;flex:1;}
.overview-content h4{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--white);margin-bottom:3px;}
.overview-content p{font-size:13px;line-height:1.5;color:rgba(255,255,255,0.5);margin:0;}
.overview-arrow{font-size:16px;color:var(--text-dim);padding:0 20px;flex-shrink:0;transition:color 0.15s,transform 0.15s;}
.overview-row:hover .overview-arrow{color:var(--accent);transform:translateX(3px);}

/* ── Module closer ── */
.module-closer{background:linear-gradient(135deg,#000 0%,#051205 50%,#000 100%);border-top:1px solid var(--border);padding:80px 0;text-align:center;}
.module-closer h2{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(32px,5vw,56px);text-transform:uppercase;letter-spacing:0.02em;line-height:1;color:var(--white);margin-bottom:8px;}
.module-closer h2 em{color:var(--accent);font-style:normal;}
.module-closer p{font-size:17px;color:var(--text);max-width:500px;margin:16px auto 32px;line-height:1.7;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#000;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;height:48px;padding:0 32px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.85;}

/* ── Footer ── */
footer{background:var(--charcoal);border-top:1px solid var(--border);padding:28px 32px;text-align:center;}
footer p{font-size:11px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:'Oswald',sans-serif;font-weight:600;}

/* ── Fade in ── */
.fade-in{opacity:0;transform:translateY(16px);transition:opacity 0.5s ease,transform 0.5s ease;}
.fade-in.visible{opacity:1;transform:translateY(0);}

/* ── Mobile ── */
@media(max-width:640px){
  .content-wrap{padding:0 16px;}
  .core-teaching{padding:28px 24px;}
  .card-grid.cols-2,.card-grid.cols-3{grid-template-columns:1fr;}
  .quad-cell:nth-child(1){padding:16px 60px 60px 16px;}
  .quad-cell:nth-child(2){padding:16px 16px 60px 60px;}
  .quad-cell:nth-child(3){padding:60px 60px 16px 16px;}
  .quad-cell:nth-child(4){padding:60px 16px 16px 60px;}
  .quad-center-badge{width:100px;height:100px;}
  .quad-center-badge p{font-size:10px;}
  .intro-steps{grid-template-columns:1fr;}
  .intro-stat-row{flex-direction:column;}
  .intro-stat{border-right:none;border-bottom:1px solid var(--border);}
  .intro-stat:last-child{border-bottom:none;}
  .track-node-label{display:none;}
}

/* ── Section divider (hidden — card spacing handles it) ── */
.section-divider{display:none;}
</style>

function buildCallout(c) {
  if (!c) return '';
  const cls = c.style === 'volt' ? ' volt' : c.style === 'quote' ? ' quote' : '';
  return `<div class="callout${cls}"><p>${c.text}</p></div>`;
}

function buildCards(cfg) {
  if (!cfg) return '';
  const items = cfg.items.map(item => {
    const ac = item.accent || cfg.accent || 'neon';
    const acCls = ac === 'volt' ? ' volt' : ac === 'red' ? ' red' : '';
    return `<div class="card${acCls}"><h4>${item.heading}</h4><p>${item.body}</p></div>`;
  }).join('');
  return `<div class="card-grid cols-${cfg.cols || 2}">${items}</div>`;
}

function buildTags(tags) {
  if (!tags || !tags.length) return '';
  const items = tags.map(t => `<span class="tag ${t.style}">${t.text}</span>`).join('');
  return `<div class="tag-row">${items}</div>`;
}

function buildSequence(seq) {
  if (!seq || !seq.length) return '';
  const items = seq.map((s, i) =>
    `<div class="seq-item">
      <div class="seq-num">0${i+1}</div>
      <div class="seq-content"><h4>${s.heading}</h4><p>${s.body}</p></div>
    </div>`
  ).join('');
  return `<div class="seq-list">${items}</div>`;
}

function buildRoundWon(list) {
  if (!list || !list.length) return '';
  const items = list.map(r =>
    `<div class="rw-card"><p>${r}</p><div class="rw-label">→ Round Won.</div></div>`
  ).join('');
  return `<div class="round-won-list">${items}</div>`;
}

function buildAccordion(items) {
  if (!items || !items.length) return '';
  const rows = items.map(a => {
    const body = a.body.map(b => `<p>${b}</p>`).join('');
    return `<div class="accordion-item">
      <button class="accordion-trigger">${a.trigger}<span class="accordion-icon">+</span></button>
      <div class="accordion-body"><div class="accordion-inner">${body}</div></div>
    </div>`;
  }).join('');
  return `<div class="accordion">${rows}</div>`;
}

function buildReframeTable(rows) {
  if (!rows || !rows.length) return '';
  const trs = rows.map(r =>
    `<tr><td>${r.fixed}</td><td class="ac">→</td><td>${r.growth}</td></tr>`
  ).join('');
  return `<table class="reframe-table">
    <thead><tr><th>Fixed Mindset</th><th class="ac"></th><th>Growth Reframe</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

function buildQuadDiagram() {
  return `<div class="quad-diagram fade-in">
    <div class="quad-cell"><h4>GRIT</h4><p>Stay hard when things get uncomfortable.</p></div>
    <div class="quad-cell"><h4>DISCIPLINE</h4><p>Execute when motivation is completely gone.</p></div>
    <div class="quad-cell"><h4>FOCUS</h4><p>Stay locked on target when life feels scattered.</p></div>
    <div class="quad-cell"><h4>CONSISTENCY</h4><p>Show up without needing perfect conditions.</p></div>
    <div class="quad-center-badge"><p>WIN THE ROUND<br>IN FRONT<br>OF YOU.</p></div>
  </div>`;
}

function buildTeaching(t, idx) {
  const acCls = t.accent === 'volt' ? ' accent-volt' : t.accent === 'red' ? ' accent-red' : '';
  const emCls = t.accent || 'neon';
  const nbarCls = t.accent === 'volt' ? ' volt' : t.accent === 'red' ? ' red' : '';
  const bodyHtml = (t.body || []).map(b => `<p>${b}</p>`).join('');

  let inner = `
    <div class="core-label">
      <span class="core-num">${t.label}</span>
      <span class="core-tagline">${t.tagline}</span>
    </div>
    <h2>${t.heading} <em class="${emCls}">${t.headingEm}</em></h2>
    <div class="nbar${nbarCls}"></div>
    ${bodyHtml}
    ${t.tags       ? buildTags(t.tags)               : ''}
    ${t.component === 'filter-diagram' ? buildFilterDiagram() : ''}
    ${t.component === 'quad-diagram'   ? buildQuadDiagram()   : ''}
    ${t.callout    ? buildCallout(t.callout)          : ''}
    ${t.cards      ? buildCards(t.cards)              : ''}
    ${t.sequence   ? buildSequence(t.sequence)        : ''}
    ${t.roundWon   ? buildRoundWon(t.roundWon)        : ''}
    ${t.accordion  ? buildAccordion(t.accordion)      : ''}
    ${t.reframeTable ? buildReframeTable(t.reframeTable) : ''}
  `;

  return `<div class="core-teaching fade-in${acCls}">${inner}</div>`;
}

function buildHomework(hw, lessonId) {
  const items = hw.items.map((item, i) =>
    `<div class="checklist-item" data-lesson="${lessonId}" data-idx="${i}">
      <div class="check-box"><span class="check-mark">✓</span></div>
      <span class="check-label">${item}</span>
    </div>`
  ).join('');
  return `<div class="homework-block" data-lesson="${lessonId}">
    <div class="homework-header">
      <div>
        <span class="homework-eyebrow">${hw.eyebrow}</span>
        <div class="homework-title">${hw.title}</div>
      </div>
      <div class="homework-progress">
        <span class="hw-progress-label">Progress</span>
        <div class="hw-progress-bar"><div class="hw-progress-fill"></div></div>
        <span class="hw-progress-count">0 / ${hw.items.length} done</span>
      </div>
    </div>
    <div class="checklist">${items}</div>
  </div>`;
}

function buildLessonSection(lesson, moduleNum) {
  const teachings = lesson.teachings.map((t, i) => buildTeaching(t, i)).join('');
  const skoolHtml = lesson.skoolPrompt
    ? `<div class="skool-prompt fade-in">
        <div class="skool-prompt-label">Skool Comment Prompt</div>
        <p>${lesson.skoolPrompt}</p>
       </div>` : '';

  return `<section class="lesson-section" id="${lesson.id}">
    <div class="lesson-hero">
      <div class="content-wrap">
        <div class="lesson-eyebrow">
          <span class="eyebrow-module">Module ${moduleNum}</span>
          <span class="eyebrow-sep">·</span>
          <span class="eyebrow-label">${lesson.eyebrow}</span>
        </div>
        <h1>${lesson.title} <em>${lesson.titleEm}</em></h1>
        <p class="hero-sub">${lesson.subtitle}</p>
        <div class="hero-meta">
          <div class="hero-meta-item"><div class="hero-meta-dot"></div><strong>Module ${moduleNum}</strong> · ${MODULE.title}</div>
          <div class="hero-meta-item"><div class="hero-meta-dot"></div>${MODULE.coach}</div>
        </div>
      </div>
    </div>
    <div class="content-wrap lesson-body">
      ${teachings}
      ${skoolHtml}
      ${buildHomework(lesson.homework, lesson.id)}
    </div>
  </section>`;
}

/* ── Build lesson nav tabs ── */
const nav = document.getElementById('lesson-nav');

  `<a href="#${l.id}" class="lesson-tab">${l.tab}</a>`

/* ── Build intro section ── */

    <p>Life doesn't get easier. The schedule won't open up. But when your mind is trained, you don't fold. You adapt. You lead. You keep showing up — even when it's hard.</p>

/* ════════════════════════════════
   INTERACTIONS
════════════════════════════════ */

/* Reading progress */
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = doc.scrollHeight - doc.clientHeight > 0
    ? (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100 : 0;
  document.getElementById('reading-progress').style.width = pct + '%';
});

/* Active tab on scroll */
function updateActiveTab() {
  const scrollY = window.scrollY + 120;
  const sections = ['intro', ...MODULE.lessons.map(l => l.id)]
    .map(id => document.getElementById(id)).filter(Boolean);
  let current = 'intro';
  sections.forEach(sec => { if (sec.offsetTop <= scrollY) current = sec.id; });
  document.querySelectorAll('.lesson-tab').forEach(tab => {
    const href = tab.getAttribute('href').replace('#','');
    tab.classList.toggle('active', href === current);
  });
}
window.addEventListener('scroll', updateActiveTab, { passive: true });

/* Smooth scroll */
function scrollToTarget(sel) {
  const t = document.querySelector(sel);
  if (t) window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - 105, behavior: 'smooth' });
}
function smoothNav(e, sel) { e.preventDefault(); scrollToTarget(sel); }
document.querySelectorAll('.lesson-tab').forEach(tab =>
  tab.addEventListener('click', e => { e.preventDefault(); scrollToTarget(tab.getAttribute('href')); })
);

/* How it works toggle */
document.getElementById('how-toggle').addEventListener('click', () => {
  const open = document.getElementById('how-body').classList.toggle('open');
  document.getElementById('how-btn').textContent = open ? 'Read less ↑' : 'Read more ↓';
});

/* Accordion */
document.addEventListener('click', e => {
  const btn = e.target.closest('.accordion-trigger');
  if (!btn) return;
  const body = btn.closest('.accordion-item').querySelector('.accordion-body');
  const isOpen = body.classList.contains('open');
  btn.closest('.accordion').querySelectorAll('.accordion-body,.accordion-trigger').forEach(el => el.classList.remove('open'));
  if (!isOpen) { body.classList.add('open'); btn.classList.add('open'); }
});

/* Checklist */
function updateProgress(block) {
  const items = block.querySelectorAll('.checklist-item');
  const checked = block.querySelectorAll('.checklist-item.checked').length;
  block.querySelector('.hw-progress-fill').style.width = (checked / items.length * 100) + '%';
  block.querySelector('.hw-progress-count').textContent = `${checked} / ${items.length} done`;
}
document.addEventListener('click', e => {
  const item = e.target.closest('.checklist-item');
  if (!item) return;
  item.classList.toggle('checked');
  const block = item.closest('.homework-block');
  updateProgress(block);
  const key = `ctofit_m${MODULE.num}_${block.dataset.lesson}_${item.dataset.idx}`;
  localStorage.setItem(key, item.classList.contains('checked') ? '1' : '0');
});

/* Restore checklist */
document.querySelectorAll('.homework-block').forEach(block => {
  block.querySelectorAll('.checklist-item').forEach(item => {
    const key = `ctofit_m${MODULE.num}_${block.dataset.lesson}_${item.dataset.idx}`;
    if (localStorage.getItem(key) === '1') item.classList.add('checked');
  });
  updateProgress(block);
});

/* Fade in on scroll */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.08 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

/* Card spotlight */
const cards = Array.from(document.querySelectorAll('.core-teaching'));
function spotlight() {
  if (!cards.length) return;
  const vh = window.innerHeight;
  let best = null, bestScore = -Infinity;
  cards.forEach(c => {
    const r = c.getBoundingClientRect();
    const inZone = r.bottom > vh * 0.15 && r.top < vh * 0.75;
    const score = -(Math.abs(r.top + r.height / 2 - vh * 0.4));
    if (inZone && score > bestScore) { bestScore = score; best = c; }
  });
  cards.forEach(c => {
    c.classList.toggle('card-active', c === best);
    c.classList.toggle('card-dim', c !== best);
  });
}
window.addEventListener('scroll', spotlight, { passive: true });
window.addEventListener('resize', spotlight, { passive: true });
setTimeout(spotlight, 120);
</script>
